# LaborSieve configuration.
# Created by labor-sieve quickstart or labor-sieve init.

# Ordered seniority values:
# entry, junior, mid, senior, staff, principal, executive
seniority:
  min: mid
  max: staff
  allow_principal: false
  allow_executive: false

# Built-in role family values:
# sre_infra_ops, data_center_ops, fleet_reliability, platform_ops,
# implementation_support, logistics_process, customer_operations,
# software_engineering, architect, management, unknown
#
# Custom snake_case role families are valid. The scorer uses the configured
# weight for matching role_family values emitted by sources or presets.
role_family_weights:
  sre_infra_ops: 1.00
  data_center_ops: 0.95
  fleet_reliability: 0.90
  platform_ops: 0.88
  implementation_support: 0.45
  logistics_process: 0.75
  customer_operations: 0.50
  architect: 0.35
  management: 0.15
  software_engineering: 0.10
  unknown: 0.05

keywords:
  boost:
    - linux
    - production operations
    - incident response
    - sre
    - reliability
    - automation
    - capacity planning
    - data center
    - fleet
    - hardware
    - logistics
    - process improvement
    - implementation
    - customer support
    - troubleshooting
  penalize:
    - frontend
    - full-stack
    - mobile app
    - software engineer
    - sales engineer
    - applied scientist
    - data scientist
    - research scientist
    - leetcode
    - product engineering
    - manager
    - director
    - vp
    - head of
    - people management

locations:
  remote: true
  # Local region is documentation for the search area. LaborSieve does not
  # geocode; edit accepted_locations to control which local postings match.
  local_region:
    center: Richmond, VA
    radius_miles: 40
  # Add, remove, or replace city/state strings for hybrid and on-site postings.
  # If you change local_region.center or radius_miles, update this list too.
  accepted_locations:
    - Richmond, VA
    - Henrico, VA
    - Glen Allen, VA
    - Short Pump, VA
    - Mechanicsville, VA
    - Ashland, VA
    - Midlothian, VA
    - Chesterfield, VA
    - Chester, VA
    - Colonial Heights, VA
    - Petersburg, VA
    - Hopewell, VA
    - Powhatan, VA
    - Goochland, VA
    - Sandston, VA
    - Highland Springs, VA
    - Bon Air, VA
    - Tuckahoe, VA
  # Remote jobs are accepted when the location is generic remote or matches
  # one of these strings. Remote jobs restricted to other geographies are capped.
  accepted_remote_locations:
    - United States
    - United States of America
    - USA
    - U.S.
    - US
    - North America

compensation:
  minimum_base: 115000

# Exclude companies or specific postings from all future reports.
# Add a report URL under urls, or add "source:source_id" under source_ids.
exclusions:
  companies: []
  urls: []
  source_ids: []

output:
  directory: output
  txt: true
  csv: true
  json: true
  html: true
  terminal_p0_limit: 10
  terminal_p1_limit: 15

sources:
  # Synthetic local sample data is disabled by default so normal runs use live sources.
  sample:
    enabled: false
  # Load jobs from local exports.
  # Supported file types: .csv, .json, .yaml, .yml
  # Records may include title, company, location, remote, hybrid, seniority,
  # role_family, compensation_base_min, url, description, and tags.
  local_file:
    enabled: false
    paths: []
  # Broad public source for remote roles across many companies.
  remoteok:
    enabled: true
    timeout_seconds: 20
    max_jobs: 250
    base_url: https://remoteok.com/api
  # Broad public source with international roles. Disabled by default because
  # it is much noisier for a US-centered search.
  arbeitnow:
    enabled: false
    timeout_seconds: 20
    max_pages: 1
    max_jobs: 100
    base_url: https://www.arbeitnow.com/api/job-board-api
  # Public Greenhouse Job Board API source. Use board tokens from URLs like:
  # https://boards.greenhouse.io/{board_token}
  greenhouse:
    enabled: true
    board_tokens:
      - cloudflare
      - canonical
      - coreweave
      - samsara
    timeout_seconds: 20
  # Public Lever Postings API source. Use company names from URLs like:
  # https://jobs.lever.co/{company}
  lever:
    enabled: true
    companies:
      - waabi
    timeout_seconds: 20
    base_url: https://api.lever.co/v0/postings
  # Public Ashby Job Posting API source. Use organization names from URLs like:
  # https://jobs.ashbyhq.com/{organization}
  ashby:
    enabled: true
    organizations:
      - Lambda
      - Crusoe
      - Modal
      - openai
    timeout_seconds: 30
    base_url: https://api.ashbyhq.com/posting-api/job-board
  # Public Workday candidate experience source. Use career site URLs like:
  # https://example.wd5.myworkdayjobs.com/ExampleExternalCareerSite
  # Workday checks only the company sites listed here.
  # Keep, remove, or add entries based on the companies you want to scan.
  workday:
    enabled: true
    sites:
      - company: NVIDIA
        url: https://nvidia.wd5.myworkdayjobs.com/NVIDIAExternalCareerSite
      - company: Equinix
        url: https://equinix.wd1.myworkdayjobs.com/External
      - company: Micron
        url: https://micron.wd1.myworkdayjobs.com/External
    timeout_seconds: 20
    page_size: 20
    max_jobs_per_site: 100
